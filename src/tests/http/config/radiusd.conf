#  -*- text -*-
#
#  test configuration file.  Do not install.
#
#  $Id$
#

#
#  Minimal radiusd.conf for HTTP server tests
#

testdir      = $ENV{TESTDIR}
output       = $ENV{OUTPUT}
run_dir      = ${output}
pidfile      = ${run_dir}/radiusd.pid
panic_action = "gdb -batch -x src/tests/panic.gdb %e %p > ${run_dir}/gdb.log 2>&1; cat ${run_dir}/gdb.log"

raddb        = raddb
radacctdir   = ${run_dir}/radacct
modconfdir   = ${raddb}/mods-config
certdir      = ${raddb}/certs
cadir        = ${raddb}/certs
test_port    = $ENV{TEST_PORT}

#  Only for testing!
#  Setting this on a production system is a BAD IDEA.
security {
	allow_vulnerable_openssl = yes
	allow_core_dumps = yes
}

client localhost {
	ipaddr = 127.0.0.1
	proto = tcp
}

modules {
	always reject {
		rcode = reject
	}
	always fail {
		rcode = fail
	}
	always ok {
		rcode = ok
	}
	always notfound {
		rcode = notfound
	}
}

server test {
	namespace = http

	listen {
		type = GET
		type = POST
		type = PUT
		type = DELETE
		type = PATCH
		type = HEAD
		type = OPTIONS

		transport = tcp

		tcp {
			port = ${test_port}
			ipaddr = *
		}
	}

	recv GET {
		if (&HTTP.Request.Path == '/hello') {
			&reply.HTTP.Response.Status-Code := 200
			&reply.HTTP.Response.Reason-Phrase := "OK"
			ok
		} elsif (&HTTP.Request.Path == '/notfound') {
			notfound
		} elsif (&HTTP.Request.Path == '/fail') {
			fail
		} elsif (&HTTP.Request.Path == '/reject') {
			reject
		} elsif (&HTTP.Request.Path == '/custom-error') {
			#
			#  Operator explicitly sets a custom status code (410 Gone)
			#  then returns notfound.  The auto-status logic must NOT
			#  overwrite the operator's value since it was already set.
			#
			&reply.HTTP.Response.Status-Code := 410
			&reply.HTTP.Response.Reason-Phrase := "Gone"
			notfound
		} elsif (&HTTP.Request.Path == '/body') {
			&reply.HTTP.Response.Status-Code := 200
			&reply.HTTP.Response.Reason-Phrase := "OK"
			&reply.HTTP.Body := "hello"
			ok
		} elsif (&HTTP.Request.Path == '/ok-default') {
			#
			#  Return ok without setting Status-Code.
			#  The process layer should auto-set 200 OK.
			#
			ok
		} elsif (&HTTP.Request.Path == '/teapot') {
			#
			#  Set a status code not in the auto-reason table (418)
			#  without providing a Reason-Phrase.  The encoder must
			#  not hard-fail — it should send "HTTP/1.1 418 \r\n".
			#
			&reply.HTTP.Response.Status-Code := 418
			ok
		} else {
			&reply.HTTP.Response.Status-Code := 200
			&reply.HTTP.Response.Reason-Phrase := "OK"
			ok
		}
	}

	send GET-Response {
	}

	recv POST {
		&reply.HTTP.Response.Status-Code := 201
		&reply.HTTP.Response.Reason-Phrase := "Created"
		ok
	}

	send POST-Response {
	}

	recv PUT {
		&reply.HTTP.Response.Status-Code := 200
		&reply.HTTP.Response.Reason-Phrase := "OK"
		ok
	}

	send PUT-Response {
	}

	recv DELETE {
		&reply.HTTP.Response.Status-Code := 204
		&reply.HTTP.Response.Reason-Phrase := "No Content"
		ok
	}

	send DELETE-Response {
	}

	recv PATCH {
		&reply.HTTP.Response.Status-Code := 200
		&reply.HTTP.Response.Reason-Phrase := "OK"
		ok
	}

	send PATCH-Response {
	}

	recv HEAD {
		if (&HTTP.Request.Path == '/body') {
			&reply.HTTP.Response.Status-Code := 200
			&reply.HTTP.Response.Reason-Phrase := "OK"
			&reply.HTTP.Body := "hello"
		} else {
			&reply.HTTP.Response.Status-Code := 200
			&reply.HTTP.Response.Reason-Phrase := "OK"
		}
		ok
	}

	send HEAD-Response {
	}

	recv OPTIONS {
		&reply.HTTP.Response.Status-Code := 200
		&reply.HTTP.Response.Reason-Phrase := "OK"
		ok
	}

	send OPTIONS-Response {
	}
}
